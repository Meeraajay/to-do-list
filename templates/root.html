{% load static %}
<html lang="en">
<head>
    <title>To Do List App</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <h1>My To Do List</h1>
        
        <div class="header">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addBtn">Add Note</button>
        </div>

        <ul id="taskList">
            <li>
                <input type="checkbox" class="task-checkbox">
                <span class="task-text">Complete to do list task</span>
                <button class="delete-btn">×</button>
            </li>
            <li>
                <input type="checkbox" class="task-checkbox">
                <span class="task-text">finish authentication work</span>
                <button class="delete-btn">×</button>
            </li>
            <li>
                <input type="checkbox" class="task-checkbox" checked>
                <span class="task-text completed">Call dentist for appointment</span>
                <button class="delete-btn">×</button>
            </li>
            <li>
                <input type="checkbox" class="task-checkbox">
                <span class="task-text">Prepare presentation slides</span>
                <button class="delete-btn">×</button>
            </li>
        </ul>
    </div>

    <!-- Load the external JS file here -->
    <script src="{% static 'script.js' %}"></script>
</body>
</html>
